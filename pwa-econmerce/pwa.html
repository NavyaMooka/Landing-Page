<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Basic styling */
        .product-container { display: flex; gap: 40px; padding: 20px; font-family: sans-serif; }
        .image-box { position: relative; width: 400px; }
        #productSlide { width: 100%; border-radius: 8px; }
        
        .prev, .next { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background-color: #ff4081; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            cursor: pointer; 
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .prev { left: -20px; }
        .next { right: -20px; }

        .details { flex: 1; }
        .price { font-size: 24px; color: #b12704; font-weight: bold; margin: 10px 0; }
        
        .sizes button { margin-right: 10px; padding: 8px 15px; cursor: pointer; background: white; border: 1px solid #ccc; border-radius: 4px; transition: 0.3s;}
        .sizes button.active { background: #ff4081; color: white; border-color: #ff4081; font-weight: bold; }
        
        .action-btns { display: flex; gap: 15px; margin-top: 20px; }
        .cart-btn { padding: 12px 25px; background: #ffa41c; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .wish-btn { padding: 12px 25px; background: white; border: 2px solid #ff4081; color: #ff4081; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #extraDetails { margin-top: 20px; padding-top: 10px; border-top: 1px solid #ddd; }
    </style>
</head>

<body>

<button class="back-btn" onclick="goBack()" style="margin: 20px;">← Back</button>

<div class="wishlist-icon" onclick="window.location.href='wishlist.html'" style="position: fixed; bottom: 85px; right: 20px; background: #fff; color: #ff4081; border: 2px solid #ff4081; padding: 10px 20px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 16px; display: flex; align-items: center; gap: 8px; z-index: 1000; font-weight: bold; font-family: sans-serif;">
  ❤️ <span id="wishlist-count">0</span>
</div>

<div class="cart-icon" onclick="window.location.href='cart.html'" style="position: fixed; bottom: 20px; right: 20px; background: #ff4081; color: white; padding: 12px 20px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 18px; display: flex; align-items: center; gap: 8px; z-index: 1000; font-weight: bold; font-family: sans-serif;">
  🛒 <span id="cart-count" style="background: white; color: #ff4081; border-radius: 50%; padding: 2px 8px; font-size: 14px;">0</span>
</div>

<div class="product-container">
    <div class="image-box">
        <button class="prev" onclick="changeProduct(-1)">❮</button>
        <img id="productSlide" alt="Product Image">
        <button class="next" onclick="changeProduct(1)">❯</button>
    </div>

    <div class="details">
        <h1 id="productTitle"></h1>
        <div class="price" id="productPrice"></div>
        <p id="productDesc" class="desc"></p>
        
        <div id="extraDetails"></div>

        <h3>Available Sizes</h3>
        <div class="sizes">
            <button onclick="selectSize('S', this)">S</button>
            <button onclick="selectSize('M', this)">M</button>
            <button onclick="selectSize('L', this)">L</button>
            <button onclick="selectSize('XL', this)">XL</button>
        </div>

        <div class="action-btns">
            <button class="cart-btn" id="mainCartBtn">Add to Cart</button>
            <button class="wish-btn" id="mainWishBtn">❤️ Wishlist</button>
        </div>
    </div>
</div>

const params = new URLSearchParams(window.location.search);
let rawProductKey = params.get("product");
let productKey = "lehenga"; 

if (rawProductKey) {
    let searchStr = rawProductKey.toLowerCase().replace(/[\s-]+/g, '');
    if (products[rawProductKey]) { productKey = rawProductKey; } 
    else if (searchStr.includes("festival")) { productKey = "festival1"; }
    else if (searchStr.includes("blazercoordoffice") || searchStr.includes("blazeroffice")) { productKey = "blazer1"; }
    else if (searchStr.includes("sweatshirtskirt")) { productKey = "combo1"; }
    else if (searchStr.includes("blazercoordset") || searchStr.includes("blazerset")) { productKey = "blazer5"; }
    else if (searchStr.includes("elegant")) { productKey = "outfit1"; }
    else if (searchStr.includes("longfrockdress")) { productKey = "longfrockdress1"; }
    else if (searchStr.includes("longfrock")) { productKey = "longfrock"; }
    else if (searchStr.includes("bridal") || searchStr.includes("wedding")) { productKey = "bridaldress"; }
    else if (searchStr.includes("tshirt") || searchStr.includes("winter")) { productKey = "top1"; }
    else if (searchStr.includes("skirt")) { productKey = "skirt1"; }
    else if (searchStr.includes("partywear")) { productKey = "lehengaparty1"; }
    else if (searchStr.includes("anarkali")) { productKey = "anarkali"; }
    else {
        let fallbackKey = Object.keys(products).find(key => key.includes(searchStr.replace(/[0-9]/g, '')));
        if (fallbackKey) { productKey = fallbackKey; }
    }
}

const allProductKeys = Object.keys(products);
const currentCategory = productKey.replace(/[0-9]/g, '');
const productKeys = allProductKeys.filter(key => key.replace(/[0-9]/g, '') === currentCategory);
let currentIndex = productKeys.indexOf(productKey);
if (currentIndex === -1) { currentIndex = 0; }
let currentProduct = products[productKeys[currentIndex]];

let userSelectedSize = null;

function selectSize(size, btnElement) {
    userSelectedSize = size;
    const buttons = document.querySelectorAll('.sizes button');
    buttons.forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
}

function renderProduct() {
    document.getElementById("productTitle").innerText = currentProduct.name;
    document.getElementById("productPrice").innerText = "₹" + currentProduct.price;
    document.getElementById("productDesc").innerText = currentProduct.desc;

    let detailsHTML = "";
    for (let key in currentProduct.details) {
        detailsHTML += `<p><b>${key}:</b> ${currentProduct.details[key]}</p>`;
    }
    document.getElementById("extraDetails").innerHTML = detailsHTML;

    let mainImage = ""; 
    const slide = document.getElementById("productSlide");
    if (currentProduct.images && currentProduct.images.length > 0) {
        slide.src = currentProduct.images[0];
        mainImage = currentProduct.images[0]; 
    } else {
        slide.src = "images/default.jpg";
        mainImage = "images/default.jpg"; 
    }

    userSelectedSize = null;
    document.querySelectorAll('.sizes button').forEach(btn => btn.classList.remove('active'));

    const cartBtn = document.getElementById("mainCartBtn");
    const wishBtn = document.getElementById("mainWishBtn");
    
    // Set Cart Action
    cartBtn.onclick = function() {
        if (!userSelectedSize) {
            alert("Please select a size before adding to cart!");
            return;
        }
        addToCart(currentProduct.name, currentProduct.price, mainImage, userSelectedSize);
    };

    // Set Wishlist Action
    wishBtn.onclick = function() {
        addToWishlist(currentProduct.name, currentProduct.price, mainImage);
    };
}

function changeProduct(direction) {
    currentIndex += direction;
    if (currentIndex < 0) { currentIndex = productKeys.length - 1; }
    if (currentIndex >= productKeys.length) { currentIndex = 0; }
    
    let newKey = productKeys[currentIndex];
    currentProduct = products[newKey];
    
    const url = new URL(window.location);
    url.searchParams.set('product', newKey);
    window.history.pushState({}, '', url);

    renderProduct();
}

function goBack(){
  if(document.referrer){
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}

renderProduct();
