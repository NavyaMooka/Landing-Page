<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | GlowGirl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4081">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button class="back-btn" onclick="window.history.back()" style="margin: 20px;">← Back to Cart</button>

    <div class="cart-layout" id="checkout-container">
        
        <div class="cart-left">
            <h2>Shipping Details 🚚</h2>
            <form id="checkout-form" onsubmit="placeOrder(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Enter your full name">
                </div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Shipping Address</label>
                    <textarea required placeholder="Enter your full address" rows="3"></textarea>
                </div>

                <div class="input-group">
                    <label>Payment Method</label>
                    <select required>
                        <option value="cod">Cash on Delivery (COD)</option>
                        <option value="card">Credit / Debit Card</option>
                        <option value="upi">UPI / Net Banking</option>
                    </select>
                </div>

                <button type="submit" class="checkout-btn" style="margin-top: 20px;">Place Order Now</button>
            </form>
        </div>

        <div class="cart-right">
            <h3>Final Order Summary</h3>
            <div id="checkout-summary"></div>
        </div>

    </div>

    <div id="success-message" style="display: none; text-align: center; padding: 100px 20px;">
        <h1 style="color: #ff4081; font-size: 60px; margin: 0;">🎉</h1>
        <h2>Order Placed Successfully!</h2>
        <p>Thank you for shopping with GlowGirl. Your fashion is on the way!</p>
        <button class="continue-btn" onclick="window.location.href='index.html'" style="margin-top: 20px; padding: 12px 30px;">
            Return to Home
        </button>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Load the summary when the checkout page opens
        window.addEventListener("load", function() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            if(cart.length === 0) {
                window.location.href = "cart.html"; // send back if cart is empty
                return;
            }

            let total = 0;
            let summaryHTML = "";

            cart.forEach(item => {
                total += (item.price * item.qty);
                summaryHTML += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                        <span>${item.qty}x ${item.name}</span>
                        <b>₹${item.price * item.qty}</b>
                    </div>
                `;
            });

            summaryHTML += `
                <div style="display: flex; justify-content: space-between; margin-top: 20px; font-size: 20px;">
                    <b>Total to Pay:</b>
                    <b style="color: #ff4081;">₹${total}</b>
                </div>
            `;
            
            document.getElementById("checkout-summary").innerHTML = summaryHTML;
        });

        // Handle the Place Order button
        function placeOrder(event) {
            event.preventDefault(); // Stop the page from reloading

            // 1. Hide the checkout form
            document.getElementById("checkout-container").style.display = "none";
            document.querySelector(".back-btn").style.display = "none";
            
            // 2. Show the success message
            document.getElementById("success-message").style.display = "block";

            // 3. Clear the cart from Local Storage
            localStorage.removeItem("cart");

            // 4. Update the little floating cart badge instantly
            if(typeof updateCartCount === "function") {
                updateCartCount();
            }
        }
    </script>
</body>
</html>
